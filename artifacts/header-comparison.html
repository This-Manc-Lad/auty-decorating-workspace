<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUTY header comparison</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 28px; background: #d7e4e6; color: #293e48; font-family: system-ui, sans-serif; }
      main { display: grid; grid-template-columns: 1.4fr .8fr; gap: 24px; max-width: 1120px; margin: 0 auto; }
      figure { margin: 0; padding: 20px; border: 1px solid rgba(255,255,255,.8); border-radius: 28px; background: rgba(255,255,255,.5); }
      figcaption { margin-bottom: 12px; font-size: 14px; }
      img { display: block; width: 100%; height: 620px; object-fit: contain; border-radius: 20px; background: rgba(255,255,255,.36); }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>Supplied horizontal AUTY logo</figcaption>
        <img src="../branding/auty-logo-horizontal.png" alt="Supplied horizontal AUTY logo" />
      </figure>
      <figure>
        <figcaption>Implemented mobile header and dashboard</figcaption>
        <img src="./auty-full-update-dashboard-mobile.png" alt="Implemented AUTY mobile dashboard" />
      </figure>
    </main>
  </body>
</html>
